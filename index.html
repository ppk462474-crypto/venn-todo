<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#fbf2e9">
  <title>固定生活 80%</title>
  <style>
    :root{--bg:#fbf2e9;--card:#fffdfa;--ink:#49382f;--muted:#927a6c;--accent:#df7850;--soft:#fff0e5;--line:#f0dfd2;--green:#548466;--shadow:0 10px 30px #8d60411a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(155deg,#fffaf4,var(--bg));color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:620px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(92px + env(safe-area-inset-bottom));min-height:100vh}.head{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 4px 16px}.eyebrow{color:var(--accent);font-weight:800;font-size:11px;letter-spacing:.12em}.head h1{font-size:27px;letter-spacing:-.06em;margin:2px 0}.date,.small{font-size:13px;color:var(--muted)}.sun{font-size:33px}.card{background:var(--card);border:1px solid #fff;box-shadow:var(--shadow);border-radius:21px;padding:16px;margin-bottom:13px}.card h2{font-size:16px;margin:0 0 10px}.notice{background:var(--soft);border-radius:14px;padding:10px 12px;color:#925237;margin-top:8px;font-size:14px}.notice:first-child{margin-top:0}.weather{background:#eaf4ef;color:#39745a}.weather button,.notice button{border:0;background:transparent;color:inherit;text-decoration:underline;font-weight:700;padding:0;margin-left:4px}.tabs{display:none}.tab{display:none}.tab.active{display:block}.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mode{border:1px solid var(--line);border-radius:13px;background:#fff9f4;color:var(--ink);padding:12px 8px;min-height:48px}.mode.active{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700}.principle{background:linear-gradient(135deg,#fff1e7,#fae9e5);border-radius:14px;padding:12px;margin:13px 0 0}.principle b{display:block;color:var(--accent);font-size:11px;letter-spacing:.1em;margin-bottom:4px}.states{display:grid;gap:9px}.state{border-radius:13px;background:#fff9f5;padding:10px}.state-title{font-size:13px;font-weight:700;margin-bottom:6px}.choices{display:flex;gap:8px;flex-wrap:wrap}.choice{display:flex;align-items:center;gap:6px;font-size:13px}.choice input,.todo input{accent-color:var(--accent);width:18px;height:18px}.addtag{display:flex;gap:8px;margin-top:12px}.addtag input,.field input,.field select{border:1px solid var(--line);background:#fffdf9;border-radius:10px;padding:10px;color:var(--ink);min-height:42px;width:100%}.addtag button,.primary{border:0;border-radius:11px;background:var(--ink);color:white;padding:9px 12px;font-weight:700;white-space:nowrap}.section{margin-top:16px}.section:first-child{margin-top:0}.section h3{font-size:13px;color:var(--accent);letter-spacing:.05em;margin:0 0 5px}.todo{display:flex;gap:10px;border-bottom:1px dashed var(--line);padding:12px 0}.todo:last-child{border-bottom:0}.todo.done .todo-title{text-decoration:line-through;color:var(--muted)}.todo-title{font-weight:700}.todo-desc{font-size:13px;color:var(--muted);margin-top:2px}.copy{width:100%;margin-top:12px;border:0;border-radius:12px;background:var(--soft);padding:11px;color:#985137;font-weight:700}.form{display:grid;grid-template-columns:1fr 1fr;gap:9px}.field{display:flex;flex-direction:column;gap:4px;color:var(--muted);font-size:12px}.full{grid-column:1/-1}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stat{background:#fff6ef;border-radius:12px;padding:10px}.stat span{display:block;color:var(--muted);font-size:12px}.stat strong{font-size:18px}.expense{display:flex;justify-content:space-between;padding:10px 0;border-top:1px dashed var(--line);font-size:13px}.expense small{color:var(--muted)}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fffdfaf2;backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px max(15px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:5}.bottom-inner{width:min(620px,100%);display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.nav{border:0;background:transparent;color:var(--muted);padding:8px 4px;border-radius:12px;font-size:12px}.nav.active{background:var(--soft);color:#994f35;font-weight:800}.toast{position:fixed;z-index:10;left:50%;bottom:78px;transform:translate(-50%,15px);background:var(--ink);color:#fff;border-radius:99px;padding:9px 15px;opacity:0;transition:.2s;pointer-events:none;white-space:nowrap}.toast.show{transform:translate(-50%,0);opacity:1}.muted{color:var(--muted)}details{margin-top:12px}summary{cursor:pointer;color:var(--muted);font-size:13px}@media(min-width:520px){.modes{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body><main class="app">
  <header class="head"><div><div class="eyebrow">FIXED LIFE 80%</div><h1>每日动作生成器</h1><div class="date" id="date"></div></div><div class="sun">☼</div></header>
  <section class="card" id="reminders"></section>
  <section class="tab active" id="chooseTab">
    <div class="card"><h2>今天想怎么过？</h2><p class="small" id="modeHint"></p><div class="modes" id="modes"></div><div class="principle"><b>今日原则</b><span id="principle"></span></div><div class="addtag"><input id="tagName" maxlength="12" placeholder="新增一个自己的标签"><button id="addTag">添加</button></div></div>
    <div class="card"><h2>今天的状态</h2><p class="small">只选需要你自己判断的事，天气交给上面那张提醒卡。</p><div class="states"><div class="state"><div class="state-title">今天几点醒的？</div><div class="choices"><label class="choice"><input type="radio" name="wake" value="before">8:00 前</label><label class="choice"><input type="radio" name="wake" value="after">8:00 后</label></div></div><div class="state"><div class="state-title">今天是否洗澡？</div><div class="choices"><label class="choice"><input type="radio" name="shower" value="yes">要洗</label><label class="choice"><input type="radio" name="shower" value="no">不用</label></div></div><div class="state"><div class="state-title">今天是否洗小衣服？</div><div class="choices"><label class="choice"><input type="radio" name="laundry" value="yes">要洗</label><label class="choice"><input type="radio" name="laundry" value="no">不用</label></div></div></div></div>
  </section>
  <section class="tab" id="todoTab"><div class="card"><h2>今天的 To-do</h2><p class="small">按生活节奏排好；完成状态只属于今天。</p><div id="todos"></div><button class="copy" id="copy">复制今日清单</button></div></section>
  <section class="tab" id="moneyTab"><div class="card"><h2>Happy Money</h2><p class="small">只记让自己开心的消费。这笔是快乐，不是罪证。</p><form class="form" id="expenseForm"><label class="field">日期<input name="date" type="date" required></label><label class="field">金额（元）<input name="amount" type="number" min="0.01" step="0.01" required placeholder="58"></label><label class="field full">消费内容<input name="note" maxlength="45" placeholder="例如：下班后的漂亮饭"></label><label class="field">类别<select name="category"><option>漂亮饭</option><option>咖啡/饮品</option><option>衣服/美妆</option><option>游戏/娱乐</option><option>小玩具/小东西</option><option>其他开心消费</option></select></label><label class="field">心情<select name="feeling"><option>值得</option><option>一般</option><option>有点冲动</option></select></label><button class="primary full">记下这笔快乐</button></form><div class="stats" id="stats"></div><div id="expenseList"></div><details><summary>调整快乐钱月预算 / 清空数据</summary><div class="addtag"><input id="budget" type="number" min="0" placeholder="快乐钱月预算"><button id="saveBudget">保存</button></div><button class="copy" id="clear">清空所有本地数据</button></details></div></section>
</main><nav class="bottom"><div class="bottom-inner"><button class="nav active" data-tab="chooseTab">今日选择</button><button class="nav" data-tab="todoTab">今日 To-do</button><button class="nav" data-tab="moneyTab">Happy Money</button></div></nav><div class="toast" id="toast"></div>
<script>
(()=>{'use strict';const $=s=>document.querySelector(s),today=new Date(),todayKey=localDate(today),weekday=today.getDay(),isWeekend=weekday===0||weekday===6;const KEY={mode:'fixed80:selectedMode:'+todayKey,state:'fixed80:dailyOptions:'+todayKey,todos:'fixed80:todoChecks:'+todayKey,finance:'fixed80:financeTodo:'+todayKey,expenses:'fixed80:enjoymentExpenses',settings:'fixed80:userSettings',tags:'fixed80:customTags'};const defaultSettings={city:'杭州',enjoymentBudget:1500};let settings={...defaultSettings,...get(KEY.settings,{})},state={wake:'after',shower:'no',laundry:[1,3,4].includes(weekday)?'yes':'no',...get(KEY.state,{})},checks=get(KEY.todos,{}),financialAdded=get(KEY.finance,false),expenses=get(KEY.expenses,[]),customTags=get(KEY.tags,{weekday:[],weekend:[]});
const modeTags={weekday:[{id:'normal',name:'普通日'},{id:'course',name:'课程日'},{id:'happy',name:'Happy Day'},{id:'cleaning',name:'打扫日'}],weekend:[{id:'study',name:'学习日'},{id:'friend',name:'好友日'},{id:'rest',name:'躺平日'}]};Object.keys(modeTags).forEach(k=>modeTags[k].push(...(customTags[k]||[])));let activeGroup=isWeekend?'weekend':'weekday',mode=localStorage.getItem(KEY.mode)||defaultMode();if(!modeTags[activeGroup].some(x=>x.id===mode))mode=defaultMode();
const plans={normal:{p:'先完成长期目标，再快乐合法化。游戏放最后。',items:[['出门前','体面上班包','洗脸、护肤、防晒、换衣服、化妆。'],['上班 / 白天','公司简餐包','豆浆 + 坚果；忙碌日加玉米或粽子。'],['上班 / 白天','午餐 Happy time','和同事吃饭，不必严格限定。'],['下班后','晚餐','天目里默认晚餐，约 30 元，尽量 20:00 前结束。'],['下班后','雅思课程 1 小时','主学习放课程类内容。'],['回家后生活维护','20 分钟收拾','洗脚、刷牙、洗脸、护肤，简单收拾桌面。'],['睡前收尾','游戏时间','放在雅思之后，快乐合法。'],['睡前收尾','单词打卡 5–10 分钟','完成即算。']]},course:{p:'课程优先，雅思后移；顺序不变，强度降档。',items:[['出门前','体面上班包','洗脸、护肤、防晒、换衣服、化妆。'],['上班 / 白天','公司简餐包','豆浆 + 坚果。'],['下班后','拳击 / 课程','课程就是今天的重要事项。'],['下班后','雅思 30 分钟起','一小节课或 30 分钟课程学习。'],['回家后生活维护','收拾 / 必要时洗澡','洗脚、刷牙、洗脸、护肤。'],['睡前收尾','游戏放最后','不用剥夺快乐。'],['睡前收尾','单词打卡','5 分钟也不断链。']]},happy:{p:'漂亮饭是工作周中段续命，不是乱花钱。',items:[['出门前','体面上班包','洗脸、护肤、防晒、换衣服、化妆。'],['上班 / 白天','午餐 Happy time','和同事好好吃饭。'],['下班后','漂亮饭','建议预算 80–150 元；特殊贵饭每月最多一次。'],['下班后','雅思轻量 / 标准','回家早 60 分钟，回家晚 30 分钟也算。'],['回家后生活维护','20 分钟收拾','洗脚、刷牙、洗脸、护肤。'],['睡前收尾','游戏时间与单词','游戏合法；单词 5–10 分钟。']]},cleaning:{p:'周五清空房间，保护周末；做多少都比拖着好。',items:[['出门前','体面上班包','轻轻出门，不给自己加码。'],['上班 / 白天','正常吃饭与下班','给晚上的整理留一点电。'],['下班后','周五大整理 45–60 分钟','衣服、垃圾、地面、床铺、补货检查。'],['回家后生活维护','洗澡 / 简单收尾','做完整理后好好清洁。'],['睡前收尾','单词打卡','5 分钟不断链，然后休息。']]},study:{p:'先把长学习放在出门前，玩的时候就不背债。',items:[['出门前','雅思长学习 1.5–2 小时','中间可以拆开休息。'],['下班后','轻出门','博物馆、公园或咖啡店。'],['回家后生活维护','轻收尾','洗脸、刷牙、护肤，整理一点点。'],['睡前收尾','单词打卡','5–10 分钟。']]},friend:{p:'朋友局就是完整快乐日，不安排正式学习，只保留不断链。',items:[['出门前','基础收拾','洗脸、护肤、防晒、化妆、换衣。'],['上班 / 白天','朋友局','好好玩，不惦记正式雅思。'],['回家后生活维护','最低清洁包','刷牙、洗脸、护肤。'],['睡前收尾','单词打卡','5 分钟即可。']]},rest:{p:'有半天自由就做一次长学习，剩下时间合法躺平。',items:[['出门前','雅思长学习 2–3 小时','中间可以拆开休息。'],['下班后','自由时间','合法躺平。'],['回家后生活维护','轻整理','给明天留一点舒适。'],['睡前收尾','单词打卡','5–10 分钟。']]}};Object.values(customTags).flat().forEach(t=>plans[t.id]={p:'这是你自己命名的一天。按自己的节奏，把重要的事做一点就好。',items:isWeekend?plans.rest.items:plans.normal.items});
function defaultMode(){return isWeekend?'rest':weekday===3?'happy':weekday===5?'cleaning':'normal'}function localDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function get(k,f){try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}}function put(k,v){localStorage.setItem(k,JSON.stringify(v))}function toast(s){let e=$('#toast');e.textContent=s;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}function taskId(t){return t[0]+'|'+t[1]}
function allItems(){let base=plans[mode]?.items||plans.normal.items;let extra=[];if(state.wake==='before')extra.push(['出门前','晨间运动 10–20 分钟',state.shower==='yes'?'运动后洗澡，给一天一个轻启动。':'轻轻动一动就好。']);if(state.laundry==='yes')extra.push(['回家后生活维护','洗小衣服','内裤、袜子放进小型洗衣机。']);if(state.shower==='yes'&&!base.some(x=>x[1].includes('洗澡')))extra.push(['回家后生活维护','洗澡','把今天的疲惫洗掉。']);if(financialAdded)extra.push(['下班后','财务提醒','存房租 + 做定投。']);return [...base,...extra]}
function render(){ $('#date').textContent=today.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});renderReminders();$('#modeHint').textContent=isWeekend?'今天是周末，只显示周末标签。':'今天是工作日，只显示周内标签。';$('#modes').innerHTML=modeTags[activeGroup].map(x=>`<button class="mode ${x.id===mode?'active':''}" data-mode="${x.id}">${x.name}</button>`).join('');$('#principle').textContent=plans[mode]?.p||'按自己的节奏过好今天。';document.querySelectorAll('[name=wake]').forEach(e=>e.checked=e.value===state.wake);document.querySelectorAll('[name=shower]').forEach(e=>e.checked=e.value===state.shower);document.querySelectorAll('[name=laundry]').forEach(e=>e.checked=e.value===state.laundry);renderTodos();renderMoney()}
function renderReminders(){let fixed=[];if(today.getDate()===8)fixed.push(['今天是 8 号，记得交房租。',null]);if([15,16].includes(today.getDate()))fixed.push(['今天是 15/16 号附近，记得存房租 + 做定投。',financialAdded?'已加入今日 To-do':'加入今日 To-do']);let weekly={1:'周一：小衣服清洗日。',3:'周三：Happy Day，漂亮饭是续命。',4:'周四：可以做 10 分钟预清。',5:'周五：大整理日，保护周末。'}[weekday];let html=`<h2>今日提醒</h2><div class="notice weather" id="weatherBox">正在获取 ${settings.city} 的天气…</div>`;if(weekly)html+=`<div class="notice">${weekly}</div>`;fixed.forEach(([a,b])=>html+=`<div class="notice">${a}${b?`<button data-finance="1">${b}</button>`:''}</div>`);$('#reminders').innerHTML=html;weatherForCity(settings.city)}
async function weatherForCity(city){let box=$('#weatherBox');try{let g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=zh&format=json'),geo=await g.json(),place=geo.results?.[0];if(!place)throw Error();let w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_min,temperature_2m_max&timezone=auto`),data=await w.json(),c=data.current,code=c.weather_code;let rain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code),wind=c.wind_speed_10m>=35,cold=(data.daily.temperature_2m_min?.[0]??99)<=10,feel=c.apparent_temperature<=12;let words=[];if(rain)words.push('今天可能有雨，记得带伞');if(wind)words.push('风有点大');if(cold||feel)words.push('体感偏凉，出门可以加件外套');if(!words.length)words.push('天气平稳，照自己的节奏出门');box.textContent=`${place.name} · 现在 ${Math.round(c.temperature_2m)}°C。${words.join('；')}。`;box.dataset.loaded='1'}catch{box.innerHTML=`暂时没拿到天气。当前城市：${settings.city}。<button id="locate">获取当前位置</button> <button id="changeCity">设置城市</button>`}}
function renderTodos(){let items=allItems(),groups={};items.forEach(t=>(groups[t[0]]??=[]).push(t));$('#todos').innerHTML=Object.entries(groups).map(([sec,ts])=>`<section class="section"><h3>${sec}</h3>${ts.map(t=>{let id=taskId(t);return `<label class="todo ${checks[id]?'done':''}"><input type="checkbox" data-todo="${id}" ${checks[id]?'checked':''}><span><div class="todo-title">${t[1]}</div><div class="todo-desc">${t[2]}</div></span></label>`}).join('')}</section>`).join('')}
function renderMoney(){let month=todayKey.slice(0,7),spent=expenses.filter(x=>x.date.startsWith(month)).reduce((a,x)=>a+Number(x.amount),0),remain=settings.enjoymentBudget-spent,days=new Date(today.getFullYear(),today.getMonth()+1,0).getDate()-today.getDate()+1;$('#stats').innerHTML=`<div class="stat"><span>本月快乐钱预算</span><strong>¥${fmt(settings.enjoymentBudget)}</strong></div><div class="stat"><span>本月已记录</span><strong>¥${fmt(spent)}</strong></div><div class="stat"><span>本月剩余</span><strong>¥${fmt(remain)}</strong></div><div class="stat"><span>剩余日均（${days}天）</span><strong>¥${fmt(remain/days)}</strong></div>`;$('#expenseList').innerHTML=expenses.filter(x=>x.date.startsWith(month)).slice().reverse().slice(0,8).map(x=>`<div class="expense"><div>${x.category} · ${x.feeling}<br><small>${x.note||'没有备注'} · ${x.date}</small></div><b>¥${fmt(x.amount)}</b></div>`).join('');$('#budget').value=settings.enjoymentBudget;$('#expenseForm').elements.date.value=todayKey}function fmt(n){return Number(n).toFixed(2).replace(/\.00$/,'')}
$('#modes').onclick=e=>{let id=e.target.dataset.mode;if(!id)return;mode=id;localStorage.setItem(KEY.mode,mode);render()};document.querySelector('.states').onchange=e=>{state[e.target.name]=e.target.value;put(KEY.state,state);renderTodos()};$('#todos').onchange=e=>{let id=e.target.dataset.todo;if(!id)return;checks[id]=e.target.checked;put(KEY.todos,checks);renderTodos()};$('#reminders').onclick=e=>{if(e.target.dataset.finance){financialAdded=!financialAdded;put(KEY.finance,financialAdded);render();toast(financialAdded?'已加入今日 To-do':'已从今日 To-do 移除')}if(e.target.id==='changeCity'){let c=prompt('输入城市名称',settings.city);if(c?.trim()){settings.city=c.trim();put(KEY.settings,settings);renderReminders()}}if(e.target.id==='locate'){if(!navigator.geolocation)return toast('当前浏览器不支持定位');navigator.geolocation.getCurrentPosition(async p=>{try{let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_min&timezone=auto`),d=await r.json(),c=d.current,rain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(c.weather_code),cold=(d.daily.temperature_2m_min?.[0]??99)<=10||c.apparent_temperature<=12,wind=c.wind_speed_10m>=35,words=[];if(rain)words.push('今天可能有雨，记得带伞');if(wind)words.push('风有点大');if(cold)words.push('体感偏凉，出门可以加件外套');if(!words.length)words.push('天气平稳，照自己的节奏出门');let box=$('#weatherBox');box.textContent=`当前位置 · 现在 ${Math.round(c.temperature_2m)}°C。${words.join('；')}。`}catch{toast('定位成功，但天气获取失败')}},()=>toast('没有获取到位置，可手动设置城市'))}};
$('#addTag').onclick=()=>{let name=$('#tagName').value.trim();if(!name)return;let id='custom-'+Date.now();customTags[activeGroup].push({id,name});put(KEY.tags,customTags);mode=id;localStorage.setItem(KEY.mode,mode);plans[id]={p:'这是你自己命名的一天。按自己的节奏，把重要的事做一点就好。',items:isWeekend?plans.rest.items:plans.normal.items};$('#tagName').value='';render();toast('新标签已加入')};$('#expenseForm').onsubmit=e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target));expenses.push({id:Date.now().toString(),...d,amount:+d.amount});put(KEY.expenses,expenses);renderMoney();toast('快乐已记下 ✦')};$('#saveBudget').onclick=()=>{settings.enjoymentBudget=Number($('#budget').value)||0;put(KEY.settings,settings);renderMoney();toast('预算已保存')};$('#clear').onclick=()=>{if(confirm('确定清空所有本地数据吗？')){Object.keys(localStorage).filter(k=>k.startsWith('fixed80:')).forEach(k=>localStorage.removeItem(k));location.reload()}};$('#copy').onclick=async()=>{let text=`今日模式：${modeTags[activeGroup].find(x=>x.id===mode)?.name||'自定义标签'}\n今日原则：${plans[mode]?.p||''}\n\n`+allItems().map(t=>`${checks[taskId(t)]?'✅':'⬜'}【${t[0]}】${t[1]}：${t[2]}`).join('\n');try{await navigator.clipboard.writeText(text);toast('今日清单已复制')}catch{toast('复制失败，请长按选择文字')}};document.querySelector('.bottom').onclick=e=>{let id=e.target.dataset.tab;if(!id)return;document.querySelectorAll('.tab,.nav').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');e.target.classList.add('active')};render();
})();
</script></body></html>
