<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#fbf2e9"><title>固定生活 80%</title><style>
:root{--bg:#fbf2e9;--card:#fffdfa;--ink:#49382f;--muted:#927a6c;--accent:#df7850;--soft:#fff0e5;--line:#f0dfd2;--shadow:0 10px 28px #8d60411a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(155deg,#fffaf4,var(--bg));color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:620px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(90px + env(safe-area-inset-bottom));min-height:100vh}.head{display:flex;justify-content:space-between;padding:4px 4px 16px}.eyebrow{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.12em}.head h1{font-size:27px;letter-spacing:-.06em;margin:2px 0}.date,.small{color:var(--muted);font-size:13px}.sun{font-size:33px}.card{background:var(--card);border:1px solid #fff;box-shadow:var(--shadow);border-radius:21px;padding:16px;margin-bottom:13px}.card h2{font-size:16px;margin:0 0 9px}.notice{background:var(--soft);border-radius:14px;padding:10px 12px;color:#925237;margin-top:8px;font-size:14px}.weather{background:#eaf4ef;color:#39745a}.notice button{border:0;background:transparent;color:inherit;padding:0;text-decoration:underline;font-weight:700}.tab{display:none}.tab.active{display:block}.modes{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mode{border:1px solid var(--line);background:#fff9f4;border-radius:13px;padding:11px 8px;color:var(--ink)}.mode.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}.principle{background:linear-gradient(135deg,#fff1e7,#fae9e5);border-radius:14px;padding:12px;margin-top:13px}.principle b{display:block;color:var(--accent);font-size:11px;letter-spacing:.1em}.state{background:#fff9f5;border-radius:13px;padding:10px;margin-top:9px}.state-head{display:flex;justify-content:space-between;gap:8px}.state label{font-weight:700;font-size:13px}.choices{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}.choice{font-size:13px;display:flex;gap:5px;align-items:center}.choice input,.todo input{accent-color:var(--accent);width:18px;height:18px}.sub{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}.form,.addtodo{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{display:flex;flex-direction:column;gap:3px;color:var(--muted);font-size:12px}.field input,.field select,.addtag input{border:1px solid var(--line);background:#fffdf9;border-radius:10px;padding:9px;color:var(--ink);min-height:40px;width:100%}.full{grid-column:1/-1}.primary,.mini{background:var(--ink);color:#fff;border:0;border-radius:10px;font-weight:700;padding:10px}.mini{background:var(--soft);color:#985137;padding:4px 7px;font-size:12px}.danger{color:#b55045}.section{margin-top:15px}.section h3{font-size:13px;color:var(--accent);letter-spacing:.05em;margin:0 0 5px}.todo{display:flex;gap:9px;padding:10px 0;border-bottom:1px dashed var(--line)}.todo.done .todo-text{text-decoration:line-through;color:var(--muted)}.todo-main{flex:1;min-width:0}.todo-text{font-weight:700}.todo-actions{display:flex;gap:4px;align-items:flex-start}.copy{border:0;border-radius:12px;background:var(--soft);color:#985137;font-weight:700;padding:10px;width:100%;margin-top:12px}.addtag{display:flex;gap:8px;margin-top:12px}.addtag button{white-space:nowrap}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.stat{background:#fff6ef;border-radius:12px;padding:10px}.stat span{display:block;color:var(--muted);font-size:12px}.stat strong{font-size:18px}.expense{display:flex;justify-content:space-between;border-top:1px dashed var(--line);padding:9px 0;font-size:13px}.expense small{color:var(--muted)}.bottom{position:fixed;bottom:0;left:0;right:0;background:#fffdfaf2;backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px max(15px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));z-index:5}.bottom div{max-width:620px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.nav{border:0;background:transparent;color:var(--muted);padding:8px 3px;border-radius:11px;font-size:12px}.nav.active{background:var(--soft);color:#994f35;font-weight:800}.toast{position:fixed;bottom:78px;left:50%;transform:translate(-50%,15px);opacity:0;transition:.2s;background:var(--ink);color:#fff;border-radius:99px;padding:9px 15px;z-index:9;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}details{margin-top:12px}summary{color:var(--muted);font-size:13px;cursor:pointer}@media(min-width:520px){.modes{grid-template-columns:repeat(4,1fr)}}
</style></head><body><main class="app"><header class="head"><div><div class="eyebrow">FIXED LIFE 80%</div><h1>每日动作生成器</h1><div class="date" id="date"></div></div><div class="sun">☼</div></header><section class="card" id="reminders"></section>
<section class="tab active" id="choose"><div class="card"><h2>今天想怎么过？</h2><p class="small" id="modeHint"></p><div class="modes" id="modes"></div><div class="principle"><b>今日原则</b><span id="principle"></span></div></div><div class="card"><h2>今天的状态</h2><p class="small">勾选状态，会把对应事项轻轻加入今天的清单。</p><div id="states"></div><details><summary>+ 新增状态</summary><form class="form" id="statusForm"><label class="field full">状态名称<input name="label" required maxlength="18" placeholder="例如：今天要倒垃圾"></label><label class="field">对应 To-do<input name="todoText" maxlength="30" placeholder="例如：倒垃圾"></label><label class="field">默认阶段<select name="section"><option>出门前</option><option>上班 / 白天</option><option>下班后</option><option>回家后生活维护</option><option>雅思学习</option><option>游戏 / 自由时间</option><option>睡前收尾</option></select></label><button class="primary full">保存新状态</button></form></details></div></section>
<section class="tab" id="todo"><div class="card"><h2>今天的 To-do</h2><p class="small">回家后的日常维护排在雅思前面。你可以改字、删掉，或在同一阶段上下移动。</p><div id="todos"></div><details><summary>+ 新增 todo</summary><form class="addtodo" id="todoForm"><label class="field full">事项内容<input name="text" required maxlength="50" placeholder="例如：买一束花"></label><label class="field full">放到哪个阶段<select name="section"><option>出门前</option><option>上班 / 白天</option><option>下班后</option><option>回家后生活维护</option><option>雅思学习</option><option>游戏 / 自由时间</option><option>睡前收尾</option></select></label><button class="primary full">加入今天</button></form></details><button id="copy" class="copy">复制今日清单</button></div></section>
<section class="tab" id="money"><div class="card"><h2>Happy Money</h2><p class="small">只记录让自己开心的消费。这笔是快乐，不是罪证。</p><form class="form" id="expenseForm"><label class="field">日期<input name="date" type="date" required></label><label class="field">金额（元）<input name="amount" type="number" min="0.01" step="0.01" required></label><label class="field full">消费内容<input name="note" maxlength="45" placeholder="例如：下班后的漂亮饭"></label><label class="field">类别<select name="category"><option>漂亮饭</option><option>咖啡/饮品</option><option>衣服/美妆</option><option>游戏/娱乐</option><option>小玩具/小东西</option><option>其他开心消费</option></select></label><label class="field">心情<select name="feeling"><option>值得</option><option>一般</option><option>有点冲动</option></select></label><button class="primary full">记下这笔快乐</button></form><div class="stats" id="stats"></div><div id="expenseList"></div></div></section></main><nav class="bottom"><div><button class="nav active" data-tab="choose">今日选择</button><button class="nav" data-tab="todo">今日 To-do</button><button class="nav" data-tab="money">Happy Money</button></div></nav><div class="toast" id="toast"></div>
<script>(()=>{'use strict';const $=s=>document.querySelector(s),day=new Date(),key=localDate(day),weekend=[0,6].includes(day.getDay()),K={state:'fixed80:v3:state:'+key,todos:'fixed80:v3:todos:'+key,mode:'fixed80:v3:mode:'+key,statuses:'fixed80:customStatusOptions',expenses:'fixed80:enjoymentExpenses',settings:'fixed80:userSettings'};const secs=['出门前','上班 / 白天','下班后','回家后生活维护','雅思学习','游戏 / 自由时间','睡前收尾'];const defaults=[{id:'wake',label:'今天几点醒',type:'wake'},{id:'shower',label:'今天洗澡',type:'shower',todoText:'洗澡'},{id:'laundry',label:'今天洗小衣服',type:'boolean',todoText:'洗小衣服',section:'回家后生活维护'},{id:'course',label:'今天有运动 / 拳击 / 课程',type:'boolean',todoText:'运动 / 拳击 / 课程',section:'下班后'}];let custom=read(K.statuses,[]),state={wake:'after',...read(K.state,{})},todos=read(K.todos,[]),expenses=read(K.expenses,[]),settings={city:'杭州',enjoymentBudget:1500,...read(K.settings,{})};const tags={weekday:[['normal','普通日'],['course','课程日'],['happy','Happy Day'],['cleaning','打扫日']],weekend:[['study','学习日'],['friend','好友日'],['rest','躺平日']]};let tagset=weekend?tags.weekend:tags.weekday,mode=localStorage.getItem(K.mode)|| (weekend?'rest':day.getDay()===3?'happy':'normal');if(!tagset.some(x=>x[0]===mode))mode=tagset[0][0];const plans={normal:['先完成长期目标，再快乐合法化。游戏放最后。',[['出门前','洗脸护肤','防晒、换衣服、化妆。'],['上班 / 白天','上班与午饭','公司简餐包；午餐 Happy time。'],['下班后','吃晚饭','天目里默认晚餐，约 30 元。'],['回家后生活维护','人类维护 20 分钟','洗脚、刷牙、洗脸护肤、简单收拾桌面。'],['雅思学习','雅思学习 1 小时','主学习放课程类内容。'],['游戏 / 自由时间','原神 / 王者 / 自由放空','游戏合法，放在学习之后。'],['睡前收尾','明天衣服与闹钟','轻轻收尾就好。']]],course:['课程优先，雅思后移；顺序不变，强度降档。',[['出门前','洗脸护肤','防晒、换衣服。'],['上班 / 白天','上班与午饭','正常吃饭。'],['下班后','运动 / 拳击 / 课程','课程就是今天的重要事项。'],['回家后生活维护','人类维护','洗脚、刷牙、洗脸护肤。'],['雅思学习','雅思 30 分钟','一小节课也算。'],['游戏 / 自由时间','自由放松','不剥夺快乐。'],['睡前收尾','单词打卡','5 分钟不断链。']]],happy:['漂亮饭是工作周中段续命，不是乱花钱。',[['出门前','体面出门','洗脸护肤、防晒、换衣服。'],['上班 / 白天','上班与午饭','照顾好自己。'],['下班后','漂亮饭','建议预算 80–150 元。'],['回家后生活维护','人类维护','洗脚、刷牙、洗脸护肤。'],['雅思学习','雅思轻量','30–60 分钟都算。'],['游戏 / 自由时间','自由放松','快乐合法。'],['睡前收尾','单词打卡','5–10 分钟。']]],cleaning:['周五清空房间，保护周末。',[['出门前','正常出门','轻轻开始一天。'],['上班 / 白天','上班与午饭','给晚上留一点电。'],['下班后','周五大整理 45–60 分钟','衣服、垃圾、地面、床铺、补货。'],['回家后生活维护','洗澡与收尾','好好清洁。'],['雅思学习','雅思轻量','30 分钟即可。'],['游戏 / 自由时间','自由放松','周末前的奖励。'],['睡前收尾','单词打卡','5 分钟。']]],study:['先学习，再轻松出门；玩的时候不背债。',[['出门前','雅思长学习 1.5–2 小时','中间可以休息。'],['下班后','轻出门','博物馆、公园或咖啡店。'],['回家后生活维护','轻收尾','洗脸、刷牙、护肤。'],['雅思学习','复盘学习','只记一点就够。'],['游戏 / 自由时间','自由时间','放心玩。'],['睡前收尾','单词打卡','5–10 分钟。']]],friend:['朋友局就是完整快乐日，只保留不断链。',[['出门前','基础收拾','洗脸护肤、防晒、化妆、换衣。'],['上班 / 白天','朋友局','好好玩。'],['回家后生活维护','最低清洁包','刷牙、洗脸、护肤。'],['游戏 / 自由时间','自由放松','不惦记正式学习。'],['睡前收尾','单词打卡','5 分钟即可。']]],rest:['有半天自由就做一次长学习，剩下时间合法躺平。',[['出门前','雅思长学习 2–3 小时','可以拆开休息。'],['下班后','自由时间','合法躺平。'],['回家后生活维护','轻整理','给明天一点舒适。'],['雅思学习','学习收尾','不做大复盘。'],['游戏 / 自由时间','自由放空','今天属于你。'],['睡前收尾','单词打卡','5–10 分钟。']]]};function localDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function read(k,f){try{return JSON.parse(localStorage.getItem(k))??f}catch{return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function toast(s){let e=$('#toast');e.textContent=s;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1600)}function id(s){return 'auto:'+s[0]+'|'+s[1]}function automatic(){let a=plans[mode][1].map(x=>({id:id(x),text:x[1],detail:x[2],section:x[0],source:'auto'}));if(state.wake==='before')a.unshift({id:'auto:wake',text:'晨间运动 10–20 分钟',detail:'醒得早就轻轻动一动。',section:'出门前',source:'auto'});defaults.concat(custom).forEach(x=>{let on=state[x.id];if(x.type==='boolean'&&on&&x.todoText)a.push({id:'state:'+x.id,text:x.todoText,detail:'来自今日状态。',section:x.section,source:'auto'});if(x.type==='shower'&&on&&state.showerTime)a.push({id:'state:shower',text:'洗澡',detail:state.showerTime==='morning'?'早上洗澡，清爽出门。':'晚上洗澡，洗掉一天疲惫。',section:state.showerTime==='morning'?'出门前':'回家后生活维护',source:'auto'})});return a}function sync(){let auto=automatic(),old=new Map(todos.map(x=>[x.id,x]));let keep=todos.filter(x=>x.source==='manual'||x.editedByUser);auto.forEach(x=>{let o=old.get(x.id);if(o&&!o.editedByUser)keep.push({...x,completed:o.completed||false});else if(o&&o.editedByUser)keep.push(o);else keep.push({...x,completed:false})});todos=keep;save(K.todos,todos)}function render(){sync();$('#date').textContent=day.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});$('#modeHint').textContent=weekend?'今天是周末，只显示周末标签。':'今天是工作日，只显示周内标签。';$('#modes').innerHTML=tagset.map(x=>`<button class="mode ${x[0]===mode?'active':''}" data-mode="${x[0]}">${x[1]}</button>`).join('');$('#principle').textContent=plans[mode][0];renderStates();renderTodos();renderMoney();renderReminders()}function renderStates(){let arr=defaults.concat(custom);$('#states').innerHTML=arr.map(x=>{if(x.type==='wake')return `<div class="state"><div class="state-head"><label>${x.label}</label></div><div class="choices"><label class="choice"><input type="radio" name="wake" value="before" ${state.wake==='before'?'checked':''}>8:00 前</label><label class="choice"><input type="radio" name="wake" value="after" ${state.wake!=='before'?'checked':''}>8:00 后</label></div></div>`;if(x.type==='shower')return `<div class="state"><div class="state-head"><label class="choice"><input data-state="shower" type="checkbox" ${state.shower?'checked':''}>${x.label}</label></div>${state.shower?`<div class="sub"><div class="small">洗澡时间</div><div class="choices"><label class="choice"><input type="radio" name="showerTime" value="morning" ${state.showerTime==='morning'?'checked':''}>早上</label><label class="choice"><input type="radio" name="showerTime" value="night" ${state.showerTime==='night'?'checked':''}>晚上</label></div></div>`:''}</div>`;return `<div class="state"><div class="state-head"><label class="choice"><input data-state="${x.id}" type="checkbox" ${state[x.id]?'checked':''}>${x.label}</label>${x.custom?`<button class="mini danger" data-delete-status="${x.id}">删除</button>`:''}</div></div>`}).join('')}function renderTodos(){let by={};secs.forEach(s=>by[s]=[]);todos.forEach(t=>(by[t.section]??=[]).push(t));$('#todos').innerHTML=secs.filter(s=>by[s].length).map(s=>`<section class="section"><h3>${s}</h3>${by[s].map((t,i)=>`<div class="todo ${t.completed?'done':''}"><input type="checkbox" data-check="${t.id}" ${t.completed?'checked':''}><div class="todo-main"><div class="todo-text">${t.text}</div>${t.detail?`<div class="small">${t.detail}</div>`:''}</div><div class="todo-actions"><button class="mini" data-up="${t.id}" ${i===0?'disabled':''}>↑</button><button class="mini" data-down="${t.id}" ${i===by[s].length-1?'disabled':''}>↓</button><button class="mini" data-edit="${t.id}">改</button><button class="mini danger" data-delete="${t.id}">×</button></div></div>`).join('')}</section>`).join('')}function renderMoney(){let m=key.slice(0,7),spent=expenses.filter(x=>x.date.startsWith(m)).reduce((n,x)=>n+ +x.amount,0),left=settings.enjoymentBudget-spent,remain=new Date(day.getFullYear(),day.getMonth()+1,0).getDate()-day.getDate()+1;$('#stats').innerHTML=`<div class="stat"><span>本月预算</span><strong>¥${fmt(settings.enjoymentBudget)}</strong></div><div class="stat"><span>已记录</span><strong>¥${fmt(spent)}</strong></div><div class="stat"><span>剩余</span><strong>¥${fmt(left)}</strong></div><div class="stat"><span>剩余日均</span><strong>¥${fmt(left/remain)}</strong></div>`;$('#expenseList').innerHTML=expenses.filter(x=>x.date.startsWith(m)).slice().reverse().slice(0,8).map(x=>`<div class="expense"><div>${x.category} · ${x.feeling}<br><small>${x.note||'没有备注'} · ${x.date}</small></div><b>¥${fmt(x.amount)}</b></div>`).join('');$('#expenseForm').elements.date.value=key}function fmt(n){return Number(n).toFixed(2).replace(/\.00$/,'')}function renderReminders(){let fin=day.getDate()===8?'今天是 8 号，记得交房租。':[15,16].includes(day.getDate())?'今天是 15/16 号附近，记得存房租 + 做定投。':'';$('#reminders').innerHTML=`<h2>今日提醒</h2><div class="notice weather" id="weather">正在使用 Open‑Meteo 获取天气…</div>${fin?`<div class="notice">${fin}</div>`:''}`;getWeather()}async function getWeather(){let box=$('#weather');let city=settings.city;try{let g=await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=zh&format=json'),p=(await g.json()).results?.[0];if(!p)throw Error();await weatherAt(p.latitude,p.longitude,p.name)}catch{box.innerHTML=`天气获取失败，出门前自己看一眼天气。<button id="city">设置城市</button> <button id="locate">获取当前位置</button>`}}async function weatherAt(lat,lon,name){let box=$('#weather');try{let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`),d=await r.json(),c=d.current,code=c.weather_code,rain=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code)||d.daily.precipitation_probability_max?.[0]>=40,wind=c.wind_speed_10m>=35,cold=d.daily.temperature_2m_min?.[0]<=10||c.apparent_temperature<=12,w=[];if(rain)w.push('今天可能有雨，出门记得带伞');if(cold)w.push('今天有点降温，可以加件外套');if(wind)w.push('风比较大，外套别穿太轻飘');if(!w.length)w.push('天气平稳，照自己的节奏出门');box.textContent=`${name} · 现在 ${Math.round(c.temperature_2m)}°C，最高 ${Math.round(d.daily.temperature_2m_max[0])}° / 最低 ${Math.round(d.daily.temperature_2m_min[0])}°。${w.join('；')}。`}catch{box.textContent='天气获取失败，出门前自己看一眼天气。'}}
$('#modes').onclick=e=>{if(e.target.dataset.mode){mode=e.target.dataset.mode;localStorage.setItem(K.mode,mode);render()}};$('#states').onchange=e=>{if(e.target.dataset.state)state[e.target.dataset.state]=e.target.checked;if(e.target.name==='wake')state.wake=e.target.value;if(e.target.name==='showerTime')state.showerTime=e.target.value;if(!state.shower)delete state.showerTime;save(K.state,state);render()};$('#states').onclick=e=>{let x=e.target.dataset.deleteStatus;if(x){custom=custom.filter(s=>s.id!==x);delete state[x];save(K.statuses,custom);save(K.state,state);render()}};$('#statusForm').onsubmit=e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target)),x={id:'custom_'+Date.now(),label:d.label,todoText:d.todoText,section:d.section,type:'boolean',custom:true};custom.push(x);save(K.statuses,custom);e.target.reset();render();toast('新状态已加入')};$('#todos').onchange=e=>{let t=todos.find(x=>x.id===e.target.dataset.check);if(t){t.completed=e.target.checked;save(K.todos,todos);renderTodos()}};$('#todos').onclick=e=>{let find=k=>todos.find(x=>x.id===e.target.dataset[k]);if(e.target.dataset.delete){todos=todos.filter(x=>x.id!==e.target.dataset.delete);save(K.todos,todos);renderTodos()}if(e.target.dataset.edit){let t=find('edit'),v=prompt('修改 todo',t.text);if(v?.trim()){t.text=v.trim();t.editedByUser=true;save(K.todos,todos);renderTodos()}}for(let k of ['up','down'])if(e.target.dataset[k]){let t=find(k),same=todos.filter(x=>x.section===t.section),i=same.indexOf(t),j=k==='up'?i-1:i+1;if(same[j]){let a=todos.indexOf(t),b=todos.indexOf(same[j]);[todos[a],todos[b]]=[todos[b],todos[a]];save(K.todos,todos);renderTodos()}}};$('#todoForm').onsubmit=e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target));todos.push({id:'manual_'+Date.now(),text:d.text,section:d.section,source:'manual',editedByUser:true,completed:false});save(K.todos,todos);e.target.reset();renderTodos();toast('已加入今天')};$('#expenseForm').onsubmit=e=>{e.preventDefault();let d=Object.fromEntries(new FormData(e.target));expenses.push({id:Date.now().toString(),...d,amount:+d.amount});save(K.expenses,expenses);renderMoney();toast('快乐已记下 ✦')};$('#reminders').onclick=e=>{if(e.target.id==='city'){let c=prompt('输入城市名称',settings.city);if(c?.trim()){settings.city=c.trim();save(K.settings,settings);getWeather()}}if(e.target.id==='locate'){navigator.geolocation?.getCurrentPosition(p=>weatherAt(p.coords.latitude,p.coords.longitude,'当前位置'),()=>toast('定位失败，请设置城市'))}};$('#copy').onclick=async()=>{let s=todos.map(t=>`${t.completed?'✅':'⬜'}【${t.section}】${t.text}`).join('\n');try{await navigator.clipboard.writeText(s);toast('今日清单已复制')}catch{toast('复制失败')}};$('.bottom').onclick=e=>{let id=e.target.dataset.tab;if(!id)return;document.querySelectorAll('.tab,.nav').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');e.target.classList.add('active')};render()})();</script></body></html>
